<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복음 중심 성경공부 AI 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .bible-font { font-family: 'Noto Serif KR', serif; }
        .gradient-header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e5e7eb; }
        .interpretation-box { background: #fdf2f8; border-left: 4px solid #db2777; }
        .related-verse-btn { transition: all 0.2s; }
        .related-verse-btn:hover { transform: translateX(5px); background: #eff6ff; }
        
        /* Loading animation */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="gradient-header text-white py-12 px-6 text-center shadow-lg relative">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl md:text-5xl font-bold mb-4 tracking-tight">📖 복음 성경공부 AI 엔진</h1>
            <p class="text-indigo-200 text-lg md:text-xl font-light italic">"말씀 속에 감춰진 하나님의 구원 계획을 발견합니다."</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 -mt-10 flex-1 w-full">
        <!-- Search Section -->
        <div class="card p-6 mb-8 transition-all hover:shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1">
                    <i class="fas fa-book-open absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" 
                        placeholder="예: 요한복음 3:16, 롬 5:8, 마태복음 7:7" 
                        class="w-full border-2 border-gray-100 rounded-xl pl-12 pr-4 py-4 focus:border-indigo-500 outline-none text-lg shadow-sm">
                </div>
                <button onclick="startDeepStudy()" id="searchBtn" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all flex items-center justify-center gap-2 shadow-lg">
                    <span>복음적 해석 시작</span>
                    <div id="btnSpinner" class="spinner hidden"></div>
                </button>
            </div>
            <p class="text-sm text-gray-400 mt-4 text-center">성경 전체 구절을 대상으로 AI가 복음의 의미를 실시간 분석합니다.</p>
        </div>

        <!-- Result Section (Initially Hidden) -->
        <div id="resultLayout" class="grid grid-cols-1 lg:grid-cols-3 gap-8 hidden">
            
            <!-- Left: Original Verse & Image -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card p-8 border-t-8 border-indigo-500">
                    <h3 class="text-indigo-600 font-bold uppercase tracking-widest text-xs mb-4">Original Verse</h3>
                    <h2 id="resTitle" class="text-2xl font-bold text-gray-900 mb-4"></h2>
                    <p id="resOriginalText" class="bible-font text-xl leading-relaxed text-gray-800 italic"></p>
                </div>
                
                <div id="imageSection" class="card p-4 hidden">
                    <h3 class="text-xs font-bold text-gray-400 mb-2 uppercase">묵상 이미지</h3>
                    <img id="verseImage" src="" alt="Bible Verse Reflection" class="w-full rounded-lg shadow-inner bg-gray-100">
                    <p class="text-[10px] text-gray-400 mt-2 text-center">AI가 구절의 의미를 바탕으로 생성한 이미지입니다.</p>
                </div>
            </div>

            <!-- Middle: Gospel Interpretation -->
            <div class="lg:col-span-2 space-y-6">
                <div class="card p-8 interpretation-box">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="bg-pink-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                            <i class="fas fa-heart"></i>
                        </div>
                        <h3 class="text-xl font-extrabold text-pink-900">복음적 의미 해석</h3>
                    </div>
                    <div id="interpretationContent" class="text-gray-800 text-lg leading-relaxed space-y-4 whitespace-pre-wrap">
                        <!-- AI content here -->
                    </div>
                </div>

                <!-- Related Verses -->
                <div class="card p-8 border-t-8 border-blue-500">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                            <i class="fas fa-link"></i>
                        </div>
                        <h3 class="text-xl font-extrabold text-blue-900">연관된 복음 구절</h3>
                    </div>
                    <div id="relatedList" class="space-y-3">
                        <!-- Related verses here -->
                    </div>
                </div>
            </div>

        </div>

        <!-- Initial Placeholder -->
        <div id="placeholder" class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-200">
            <i class="fas fa-praying-hands text-6xl text-gray-200 mb-6"></i>
            <h3 class="text-xl font-bold text-gray-400">말씀의 깊은 의미를 함께 공부합니다</h3>
            <p class="text-gray-300 mt-2">입력창에 성경 장절을 입력하고 버튼을 눌러주세요.</p>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-500 py-12 px-6 text-center text-sm">
        <p class="mb-4">"너희는 온 천하에 다니며 만민에게 복음을 전파하라" (막 16:15)</p>
        <p class="opacity-30 uppercase tracking-widest font-bold">Gospel AI Bible Study Project</p>
    </footer>

    <script>
        const apiKey = ""; // API Key is automatically handled by the environment

        // Korean Book Name Mapping for Bible API
        const bookMap = {
            "창세기": "Genesis", "창": "Genesis", "출애굽기": "Exodus", "출": "Exodus",
            "요한복음": "John", "요": "John", "로마서": "Romans", "롬": "Romans",
            "마태복음": "Matthew", "마": "Matthew", "마가복음": "Mark", "막": "Mark",
            "누가복음": "Luke", "눅": "Luke", "사도행전": "Acts", "행": "Acts",
            "에베소서": "Ephesians", "엡": "Ephesians", "갈라디아서": "Galatians", "갈": "Galatians",
            "빌립보서": "Philippians", "빌": "Philippians", "골로새서": "Colossians", "골": "Colossians",
            "히브리서": "Hebrews", "히": "Hebrews", "요한계시록": "Revelation", "계": "Revelation"
        };

        async function startDeepStudy() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return alert("성경 구절을 입력해주세요.");

            const searchBtn = document.getElementById('searchBtn');
            const btnSpinner = document.getElementById('btnSpinner');
            const resultLayout = document.getElementById('resultLayout');
            const placeholder = document.getElementById('placeholder');

            searchBtn.disabled = true;
            btnSpinner.classList.remove('hidden');

            try {
                // 1. Fetch Original Verse Text
                const verseData = await fetchBibleVerse(input);
                if (!verseData) throw new Error("성경 구절을 찾을 수 없거나 불러오지 못했습니다.");

                document.getElementById('resTitle').innerText = verseData.reference;
                document.getElementById('resOriginalText').innerText = `"${verseData.text.trim()}"`;

                // 2. Interpret Gospel Meaning using Gemini AI
                const interpretation = await interpretWithAI(verseData.reference, verseData.text);
                renderInterpretation(interpretation);

                // 3. Generate Reflection Image
                generateVerseImage(verseData.reference, verseData.text);

                placeholder.classList.add('hidden');
                resultLayout.classList.remove('hidden');
                window.scrollTo({ top: 400, behavior: 'smooth' });

            } catch (error) {
                console.error(error);
                alert("오류가 발생했습니다: " + error.message);
            } finally {
                searchBtn.disabled = false;
                btnSpinner.classList.add('hidden');
            }
        }

        async function fetchBibleVerse(query) {
            let processedQuery = query;
            for (const [kr, en] of Object.entries(bookMap)) {
                if (query.startsWith(kr)) {
                    processedQuery = query.replace(kr, en);
                    break;
                }
            }
            
            // Try Public API first
            const url = `https://bible-api.com/${encodeURIComponent(processedQuery)}?translation=krv`;
            try {
                const response = await fetch(url);
                if (response.ok) {
                    return await response.json();
                }
            } catch (e) {
                console.warn("Public API CORS or Fetch Error, using AI fallback...");
            }

            // AI Fallback if Fetch fails
            const systemPrompt = "성경 구절 전문가입니다. 요청된 성경 구절의 장:절 제목과 본문(한국어 개역한글 버전)을 JSON 형식으로 반환하십시오. 예: { \"reference\": \"요한복음 3:16\", \"text\": \"하나님이 세상을...\" }";
            const userPrompt = `${query} 구절의 내용과 제목을 알려주세요.`;
            
            try {
                const aiResponse = await callGeminiAPI(systemPrompt, userPrompt, true);
                return JSON.parse(aiResponse);
            } catch (e) {
                console.error("AI Fallback failed", e);
                return null;
            }
        }

        async function interpretWithAI(ref, text) {
            const systemPrompt = `
                당신은 복음 중심의 성경 학자입니다. 사용자가 제공한 성경 구절을 다음 단계에 따라 분석하여 한국어로 답변하십시오:
                1. 복음적 해석: 창조, 타락, 구속, 회복의 관점에서 이 구절이 가진 핵심 복음적 메시지를 설명하십시오.
                2. 공부 포인트: 이 구절에서 성경 공부를 할 때 놓치지 말아야 할 신학적 의미를 2-3가지 제시하십시오.
                3. 연관 구절: 이 구절의 복음적 의미를 더 깊게 이해할 수 있는 다른 성경 구절 3가지를 '장:절' 형식과 함께 그 이유를 한 줄로 적으십시오.
                JSON 형식을 사용하지 말고 읽기 좋은 텍스트로 작성하십시오.
            `;
            const userPrompt = `구절: ${ref}\n내용: ${text}`;

            return await callGeminiAPI(systemPrompt, userPrompt);
        }

        async function callGeminiAPI(system, user, isJson = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: user }] }],
                systemInstruction: { parts: [{ text: system }] }
            };

            if (isJson) {
                payload.generationConfig = { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            reference: { type: "STRING" },
                            text: { type: "STRING" }
                        }
                    }
                };
            }

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("AI와의 통신이 원활하지 않습니다.");
        }

        function renderInterpretation(text) {
            const container = document.getElementById('interpretationContent');
            const relatedContainer = document.getElementById('relatedList');
            
            const sections = text.split(/3\.\s*연관\s*구절/i);
            container.innerText = sections[0].trim();

            if (sections[1]) {
                relatedContainer.innerHTML = '';
                const lines = sections[1].trim().split('\n');
                lines.forEach(line => {
                    if (line.trim()) {
                        const btn = document.createElement('button');
                        btn.className = "related-verse-btn w-full text-left p-4 card border border-gray-100 flex items-center justify-between group";
                        btn.innerHTML = `
                            <span class="text-blue-700 font-bold">${line}</span>
                            <i class="fas fa-chevron-right text-gray-200 group-hover:text-blue-400"></i>
                        `;
                        const match = line.match(/([가-힣\d\s]+ \d+:\d+)/);
                        if (match) {
                            btn.onclick = () => {
                                document.getElementById('searchInput').value = match[0];
                                startDeepStudy();
                            };
                        }
                        relatedContainer.appendChild(btn);
                    }
                });
            }
        }

        async function generateVerseImage(ref, text) {
            const section = document.getElementById('imageSection');
            const img = document.getElementById('verseImage');
            
            section.classList.remove('hidden');
            img.classList.add('animate-pulse');

            try {
                const prompt = `A cinematic, peaceful, and spiritual atmosphere representing the bible verse "${ref}: ${text}". Beautiful lighting, high quality, sacred environment. No text in image.`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
                });
                const result = await response.json();
                const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                img.src = imageUrl;
            } catch (e) {
                console.error("Image generation failed", e);
                section.classList.add('hidden');
            } finally {
                img.classList.remove('animate-pulse');
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startDeepStudy();
        });
    </script>
</body>
</html>
