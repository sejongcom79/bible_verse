<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복음 중심 성경공부 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; }
        .bible-text { font-family: 'Noto Serif KR', serif; }
        .gradient-header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .verse-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .verse-card:hover { transform: translateX(5px); border-left-color: #4f46e5; background-color: #f8fafc; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
        
        #alertBox { display: none; position: fixed; top: 20px; right: 20px; z-index: 1000; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 알림 메시지 -->
    <div id="alertBox" class="bg-indigo-600 text-white px-6 py-4 rounded-lg shadow-2xl flex items-center">
        <i class="fas fa-info-circle mr-3 text-xl"></i>
        <span id="alertMessage" class="font-medium">안내 메시지</span>
    </div>

    <!-- 상단 헤더 -->
    <header class="gradient-header text-white py-12 px-6 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 opacity-10 transform translate-x-1/4 -translate-y-1/4">
            <i class="fas fa-cross text-[200px]"></i>
        </div>
        <div class="max-w-5xl mx-auto relative z-10">
            <h1 class="text-3xl md:text-5xl font-bold mb-3 flex items-center gap-3">
                <i class="fas fa-bible"></i> 복음 성경공부 엔진
            </h1>
            <p class="text-indigo-200 text-lg md:text-xl font-light">
                말씀 속에 감춰진 복음의 보화를 함께 발견합니다.
            </p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 -mt-10 flex-1 w-full">
        <!-- 검색창 섹션 -->
        <div class="bg-white rounded-2xl shadow-xl p-4 md:p-6 mb-8 border border-gray-100 transition-all focus-within:shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" 
                        placeholder="찾고 싶은 구절 (예: 요한복음 3:16, 롬 5:8, 마 7:7)" 
                        class="w-full border-2 border-gray-50 rounded-xl pl-12 pr-4 py-4 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 outline-none transition-all text-lg">
                </div>
                <button onclick="handleSearch()" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
                    <i class="fas fa-bolt"></i> 말씀 찾기
                </button>
            </div>
            
            <!-- 퀵 네비게이션 -->
            <div class="mt-6 flex flex-wrap gap-2 items-center">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter mr-2">복음의 단계:</span>
                <button onclick="quickSearch('창세기 1:1')" class="text-xs bg-gray-100 hover:bg-indigo-100 text-gray-600 hover:text-indigo-700 px-3 py-1.5 rounded-full transition-all">#창조</button>
                <button onclick="quickSearch('로마서 3:23')" class="text-xs bg-gray-100 hover:bg-indigo-100 text-gray-600 hover:text-indigo-700 px-3 py-1.5 rounded-full transition-all">#죄</button>
                <button onclick="quickSearch('요한복음 3:16')" class="text-xs bg-gray-100 hover:bg-indigo-100 text-gray-600 hover:text-indigo-700 px-3 py-1.5 rounded-full transition-all">#사랑</button>
                <button onclick="quickSearch('로마서 5:8')" class="text-xs bg-gray-100 hover:bg-indigo-100 text-gray-600 hover:text-indigo-700 px-3 py-1.5 rounded-full transition-all">#그리스도</button>
                <button onclick="quickSearch('에베소서 2:8')" class="text-xs bg-gray-100 hover:bg-indigo-100 text-gray-600 hover:text-indigo-700 px-3 py-1.5 rounded-full transition-all">#믿음</button>
                <button onclick="quickSearch('사도행전 1:8')" class="text-xs bg-gray-100 hover:bg-indigo-100 text-gray-600 hover:text-indigo-700 px-3 py-1.5 rounded-full transition-all">#증인</button>
            </div>
        </div>

        <!-- 결과 표시 영역 -->
        <div id="contentArea" class="grid grid-cols-1 lg:grid-cols-3 gap-8 hidden">
            <!-- 메인 구절 카드 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100 flex flex-col h-full">
                    <div class="bg-indigo-50/50 px-8 py-5 flex justify-between items-center border-b border-indigo-100">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full bg-indigo-400"></span>
                            <span id="sourceInfo" class="text-indigo-800 font-bold text-sm tracking-widest uppercase italic">KRV</span>
                        </div>
                        <button onclick="copyCurrentVerse()" class="text-indigo-400 hover:text-indigo-600 transition-colors" title="구절 복사">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <div class="p-8 md:p-16 flex-1 flex flex-col justify-center relative">
                        <div class="absolute top-10 left-10 opacity-5">
                            <i class="fas fa-quote-left text-[120px]"></i>
                        </div>
                        <h2 id="verseTitle" class="text-3xl md:text-4xl font-extrabold text-indigo-900 mb-10 tracking-tight"></h2>
                        <p id="verseText" class="bible-text text-2xl md:text-4xl leading-[1.6] text-gray-800 font-medium italic mb-10 whitespace-pre-wrap"></p>
                        
                        <div class="flex items-center gap-4 mt-auto pt-10 border-t border-gray-50">
                            <div class="bg-indigo-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
                                <i class="fas fa-dove text-sm"></i>
                            </div>
                            <p class="text-gray-400 text-sm italic">이 말씀은 하나님의 구원 계획을 선포하고 있습니다.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 사이드바: 연관 구절 -->
            <div class="lg:col-span-1">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        <i class="fas fa-stream text-indigo-600"></i> 복음 연관 구절
                    </h3>
                    <span id="relatedCount" class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-md font-bold">0</span>
                </div>
                <div id="relatedList" class="space-y-4 custom-scroll overflow-y-auto max-h-[700px] pr-2"></div>
            </div>
        </div>

        <!-- 로딩 상태 -->
        <div id="loader" class="hidden py-32 text-center">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-6"></div>
            <p id="loaderText" class="text-xl text-indigo-900 font-bold animate-pulse">말씀을 찾고 있습니다...</p>
        </div>

        <!-- 초기 화면 -->
        <div id="welcomeState" class="text-center py-24 bg-white rounded-3xl border border-dashed border-gray-200">
            <div class="w-24 h-24 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-300">
                <i class="fas fa-book-open text-4xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">말씀 공부를 시작하세요</h3>
            <p class="text-gray-400">구절을 입력하거나 태그를 클릭해 보세요.</p>
        </div>
    </main>

    <footer class="bg-indigo-950 text-indigo-400 py-12 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <p class="text-xs font-bold tracking-widest uppercase">Gospel Bible Study Engine &copy; 2026</p>
        </div>
    </footer>

    <script>
        const apiKey = ""; // Canvas 환경 지원용 빈 키
        
        // --- 핵심 구절 로컬 데이터 (오프라인 지원) ---
        const LOCAL_DB = {
            "Matthew 7:7": "구하라 그러면 너희에게 주실 것이요 찾으라 그러면 찾을 것이요 문을 두드리라 그러면 너희에게 열릴 것이니",
            "John 3:16": "하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니 이는 저를 믿는 자마다 멸망치 않고 영생을 얻게 하려 하심이니라",
            "Romans 3:23": "모든 사람이 죄를 범하였으매 하나님의 영광에 이르지 못하더니",
            "Romans 6:23": "죄의 삯은 사망이요 하나님의 은사는 그리스도 예수 우리 주 안에 있는 영생이니라",
            "Ephesians 2:8": "너희가 그 은혜를 인하여 믿음으로 말미암아 구원을 얻었나니 이것이 너희에게서 난 것이 아니요 하나님의 선물이라",
            "Acts 1:8": "오직 성령이 너희에게 임하시면 너희가 권능을 받고 예루살렘과 온 유대와 사마리아와 땅 끝까지 이르러 내 증인이 되리라 하시니라",
            "Genesis 1:1": "태초에 하나님이 천지를 창조하시니라"
        };

        const BOOK_MAP = {
            "창": "Genesis", "창세기": "Genesis", "출": "Exodus", "출애굽기": "Exodus",
            "레": "Leviticus", "민": "Numbers", "신": "Deuteronomy", "수": "Joshua",
            "삿": "Judges", "룻": "Ruth", "삼상": "1 Samuel", "삼하": "2 Samuel",
            "왕상": "1 Kings", "왕하": "2 Kings", "대상": "1 Chronicles", "대하": "2 Chronicles",
            "스": "Ezra", "느": "Nehemiah", "에": "Esther", "욥": "Job", "시": "Psalms",
            "잠": "Proverbs", "전": "Ecclesiastes", "아": "Song of Solomon", "사": "Isaiah",
            "렘": "Jeremiah", "애": "Lamentations", "겔": "Ezekiel", "단": "Daniel",
            "호": "Hosea", "욜": "Joel", "암": "Amos", "옵": "Obadiah", "요나": "Jonah",
            "미": "Micah", "나": "Nahum", "합": "Habakkuk", "습": "Zephaniah",
            "학": "Haggai", "슥": "Zechariah", "말": "Malachi",
            "마": "Matthew", "마태복음": "Matthew", "막": "Mark", "마가복음": "Mark",
            "눅": "Luke", "누가복음": "Luke", "요": "John", "요한복음": "John",
            "행": "Acts", "사도행전": "Acts", "롬": "Romans", "로마서": "Romans",
            "고전": "1 Corinthians", "고후": "2 Corinthians", "갈": "Galatians",
            "엡": "Ephesians", "에베소서": "Ephesians", "빌": "Philippians", "골": "Colossians",
            "살전": "1 Thessalonians", "살후": "2 Thessalonians", "딤전": "1 Timothy",
            "딤후": "2 Timothy", "딛": "Titus", "몬": "Philemon", "히": "Hebrews",
            "야": "James", "벧전": "1 Peter", "벧후": "2 Peter", "요일": "1 John",
            "요이": "2 John", "요삼": "3 John", "유": "Jude", "계": "Revelation"
        };

        const GOSPEL_RELS = {
            "John 3:16": ["Romans 5:8", "Ephesians 2:8", "John 1:12", "John 10:10"],
            "Romans 3:23": ["Romans 6:23", "Romans 3:10", "Isaiah 53:6", "Romans 5:8"],
            "Romans 6:23": ["John 3:16", "Romans 5:21", "Titus 3:5", "Ephesians 2:9"],
            "Matthew 7:7": ["Jeremiah 29:13", "Luke 11:9", "Proverbs 8:17"],
            "Genesis 1:1": ["John 1:1", "Colossians 1:16", "Hebrews 11:3"],
            "default": ["John 3:16", "Romans 3:23", "Romans 6:23", "Ephesians 2:8"]
        };

        function showAlert(msg) {
            const box = document.getElementById('alertBox');
            document.getElementById('alertMessage').innerText = msg;
            box.style.display = 'flex';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        function parseToEnglishRef(query) {
            const trimmed = query.trim();
            const parts = trimmed.split(/\s+/);
            if (parts.length < 2) return trimmed;
            const bookK = parts[0];
            const chVs = parts.slice(1).join(' ');
            const bookE = BOOK_MAP[bookK];
            return bookE ? `${bookE} ${chVs}` : trimmed;
        }

        // Gemini AI 백업 호출 로직
        async function fetchWithGemini(ref) {
            const userQuery = `성경 ${ref} 구절의 내용을 개역한글 버전으로 알려주세요. 다른 설명 없이 구절 텍스트만 출력하세요.`;
            const systemPrompt = "성경 구절 전문가로서 요청된 성경 구절의 텍스트(한국어 개역한글 버전)만 출력합니다.";
            
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) return text.trim();
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            return null;
        }

        async function fetchVerse(ref) {
            const engRef = parseToEnglishRef(ref);
            
            // 1. 로컬 데이터베이스 확인
            if (LOCAL_DB[engRef]) {
                return { reference: engRef, text: LOCAL_DB[engRef], source: 'OFFLINE' };
            }

            // 2. 직접 API 호출 시도
            try {
                const encoded = encodeURIComponent(engRef);
                const response = await fetch(`https://bible-api.com/${encoded}?translation=krv`);
                if (response.ok) {
                    const data = await response.json();
                    return { ...data, source: 'ONLINE' };
                }
            } catch (e) {
                console.warn(`Direct fetch failed for ${ref}, trying proxy...`);
            }

            // 3. 프록시(AllOrigins) 호출 시도
            try {
                const encoded = encodeURIComponent(engRef);
                const target = `https://bible-api.com/${encoded}?translation=krv`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const data = await response.json();
                    const parsed = JSON.parse(data.contents);
                    return { ...parsed, source: 'PROXY' };
                }
            } catch (e) {
                console.warn(`Proxy fetch failed for ${ref}, trying AI...`);
            }

            // 4. AI 백업 시도
            const aiText = await fetchWithGemini(engRef);
            if (aiText) {
                return { reference: engRef, text: aiText, source: 'AI' };
            }

            return null;
        }

        async function handleSearch() {
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return;

            document.getElementById('welcomeState').classList.add('hidden');
            document.getElementById('contentArea').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            const result = await fetchVerse(input);

            if (result && result.text) {
                document.getElementById('verseTitle').innerText = input.includes(':') ? input : result.reference;
                document.getElementById('verseText').innerText = result.text.trim();
                
                const sourceTag = document.getElementById('sourceInfo');
                sourceTag.innerText = result.source;
                sourceTag.className = `text-indigo-800 font-bold text-sm tracking-widest uppercase italic ${
                    result.source === 'AI' ? 'text-purple-600' : ''
                }`;

                if (result.source === 'AI') {
                    showAlert("네트워크 차단으로 인해 AI가 실시간으로 말씀을 찾아냈습니다.");
                }

                await loadRelated(result.reference);

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('contentArea').classList.remove('hidden');
                window.scrollTo({ top: 200, behavior: 'smooth' });
            } else {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('welcomeState').classList.remove('hidden');
                showAlert("구절을 찾을 수 없습니다. 정확한 장과 절을 입력해 주세요.");
            }
        }

        async function loadRelated(mainRef) {
            const container = document.getElementById('relatedList');
            container.innerHTML = '';
            let rels = GOSPEL_RELS[mainRef] || GOSPEL_RELS["default"];
            document.getElementById('relatedCount').innerText = rels.length;

            for (const ref of rels) {
                const data = await fetchVerse(ref);
                if (data && data.text) {
                    const card = document.createElement('div');
                    card.className = "verse-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100 cursor-pointer";
                    card.onclick = () => quickSearch(ref);
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-indigo-600 font-bold text-sm">${ref}</span>
                            <span class="text-[9px] text-gray-300 uppercase">${data.source}</span>
                        </div>
                        <p class="text-gray-600 text-sm leading-relaxed line-clamp-3">${data.text.trim()}</p>
                    `;
                    container.appendChild(card);
                }
            }
        }

        function quickSearch(val) {
            document.getElementById('searchInput').value = val;
            handleSearch();
        }

        function copyCurrentVerse() {
            const combined = `${document.getElementById('verseTitle').innerText}\n${document.getElementById('verseText').innerText}`;
            const textArea = document.createElement("textarea");
            textArea.value = combined;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showAlert("말씀이 복사되었습니다.");
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    </script>
</body>
</html>
